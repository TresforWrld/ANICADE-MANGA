<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ANICADE MANGA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#06080f;--panel:#0d1120;--panel2:#111827;--border:#1e2d4a;
  --paper:#e8eef8;--aged:#a8b8d0;--muted:#546480;
  --neon:#00d4ff;--neon2:#0099cc;--neon-glow:rgba(0,212,255,.25);
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--paper);font-family:'Rajdhani',sans-serif;font-size:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(0,212,255,.015) 1px,transparent 1px);background-size:6px 6px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--ink)}::-webkit-scrollbar-thumb{background:var(--neon);border-radius:3px}

/* ── NAV ── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:60px;display:flex;align-items:center;background:rgba(6,8,15,.97);border-bottom:2px solid var(--neon);backdrop-filter:blur(14px);padding:0 24px;box-shadow:0 0 30px rgba(0,212,255,.12)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.brand-logo{height:38px;border-radius:4px}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--paper);line-height:1}
.brand-name .bh{color:var(--neon);text-shadow:0 0 12px var(--neon)}
.nav-links{display:flex;align-items:center;gap:2px;margin-left:auto}
.nav-links a{display:flex;align-items:center;gap:6px;padding:7px 12px;color:var(--aged);text-decoration:none;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all .2s}
.nav-links a:hover,.nav-links a.active{color:var(--neon);border-color:var(--border);background:rgba(0,212,255,.07)}
.nav-links a.hub-btn{background:rgba(0,212,255,.12);color:var(--neon);border-color:var(--neon);clip-path:polygon(0 0,94% 0,100% 20%,100% 100%,6% 100%,0 80%)}
.nav-links a.hub-btn:hover{background:rgba(0,212,255,.25)}
.menu-toggle{width:34px;height:34px;border:1px solid var(--border);background:transparent;color:var(--aged);cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;margin-left:10px;font-size:14px}
.menu-toggle:hover{color:var(--neon);border-color:var(--neon)}

/* ── TAB BAR ── */
.tab-bar{position:fixed;top:60px;left:0;right:0;z-index:990;background:rgba(6,8,15,.95);border-bottom:1px solid var(--border);display:flex;backdrop-filter:blur(10px)}
.tab-btn{flex:1;padding:10px 0;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;border-bottom:3px solid transparent}
.tab-btn.active{color:var(--neon);border-bottom-color:var(--neon)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* ══ HERO — compact ~54vh ══ */
.hero-slider{position:relative;width:100%;height:54vh;min-height:360px;max-height:500px;overflow:hidden;margin-top:98px}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity .75s ease;pointer-events:none;z-index:1}
.hero-slide.active{opacity:1;pointer-events:all;z-index:2}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center 20%;filter:brightness(.42) saturate(1.1)}
.slide-overlay{position:absolute;inset:0;background:
  linear-gradient(to right,rgba(6,8,15,.97) 0%,rgba(6,8,15,.72) 38%,rgba(6,8,15,.08) 68%,transparent 100%),
  linear-gradient(to top,rgba(6,8,15,.88) 0%,transparent 52%)}
.slide-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 50px 36px;max-width:540px;z-index:3}
.slide-tag{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--neon);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.slide-tag::before{content:'';display:block;width:22px;height:2px;background:var(--neon)}
.slide-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.sl-b{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--neon);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);padding:2px 7px}
.sl-b.gold{color:#ffd700;background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.3)}
.slide-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(30px,5vw,58px);color:var(--paper);line-height:.95;margin-bottom:9px;text-shadow:0 2px 14px rgba(0,0,0,.6)}
.slide-desc{font-size:13px;color:var(--aged);line-height:1.6;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.slide-acts{display:flex;gap:8px}
.sb{background:var(--neon);border:none;color:var(--ink);padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s;clip-path:polygon(0 0,93% 0,100% 18%,100% 100%,0 100%);font-weight:700}
.sb:hover{background:#33ddff;box-shadow:0 0 16px var(--neon-glow)}
.sb-o{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.22);color:var(--paper);padding:10px 16px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s;border-radius:2px}
.sb-o:hover{border-color:var(--neon);color:var(--neon)}
/* Arrows + dots bottom-left */
.hero-bottom{position:absolute;bottom:14px;left:50px;z-index:10;display:flex;align-items:center;gap:10px}
.s-arr{width:32px;height:32px;background:rgba(6,8,15,.7);border:1px solid var(--border);color:var(--aged);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .2s;border-radius:2px}
.s-arr:hover{border-color:var(--neon);color:var(--neon)}
.s-dot{width:18px;height:2px;background:rgba(255,255,255,.2);cursor:pointer;border:none;padding:0;border-radius:1px;transition:all .28s}
.s-dot.active{background:var(--neon);width:34px}

/* ── CONTENT ── */
.content-area{max-width:1400px;margin:0 auto;padding:32px 28px 80px;position:relative;z-index:2}
.tab-content-area{max-width:1400px;margin:0 auto;padding:88px 28px 80px}
.sec-block{margin-bottom:42px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-left{display:flex;align-items:center;gap:10px}
.sec-num{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:var(--neon);background:rgba(0,212,255,.08);border:1px solid var(--neon);padding:2px 6px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;color:var(--paper)}
.sec-title .acc{color:var(--neon)}

/* ── CAROUSEL ── */
.h-car{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.h-car::-webkit-scrollbar{height:3px}.h-car::-webkit-scrollbar-thumb{background:var(--neon)}

/* ── GENRE CHIPS ── */
.genre-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.gc{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;white-space:nowrap}
.gc::before{content:'';position:absolute;inset:0;background:var(--neon);transform:scaleX(0);transform-origin:left;transition:transform .18s;z-index:-1}
.gc:hover::before,.gc.active::before{transform:scaleX(1)}
.gc:hover,.gc.active{color:var(--ink);border-color:var(--neon)}

/* ── SEARCH ── */
.search-row{display:flex;max-width:460px;margin-bottom:20px}
.search-row input{flex:1;background:rgba(0,212,255,.05);border:2px solid var(--border);border-right:none;color:var(--paper);padding:10px 14px;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;transition:border-color .2s;min-width:0}
.search-row input::placeholder{color:var(--muted)}
.search-row input:focus{border-color:var(--neon)}
.search-row button{background:var(--neon);border:none;color:var(--ink);padding:10px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s;font-weight:700;display:flex;align-items:center;gap:6px}
.search-row button:hover{background:#33ddff}

/* ── CARD ── */
.manga-card{flex-shrink:0;width:148px;scroll-snap-align:start;cursor:pointer}
.manga-card.g{width:100%;flex-shrink:1}
.cf{border:2px solid var(--border);overflow:hidden;position:relative;aspect-ratio:3/4;background:var(--panel);transition:border-color .2s,box-shadow .2s;clip-path:polygon(0 0,91% 0,100% 9%,100% 100%,9% 100%,0 91%)}
.manga-card:hover .cf{border-color:var(--neon);box-shadow:0 0 16px rgba(0,212,255,.18)}
.manga-card:hover .cc{transform:scale(1.05)}
.manga-card:hover .co{opacity:1}
.cc{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.co{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,8,15,.97) 0%,rgba(6,8,15,.22) 55%,transparent 100%);opacity:.72;transition:opacity .22s;display:flex;flex-direction:column;justify-content:flex-end;padding:9px}
.c-score{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);border:1px solid var(--neon);color:var(--neon);font-family:'Space Mono',monospace;font-size:9px;padding:2px 5px;display:flex;align-items:center;gap:3px}
.c-type{position:absolute;top:7px;right:7px;background:var(--neon);color:var(--ink);font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;padding:2px 5px;font-weight:700}
.c-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.7px;color:var(--paper);line-height:1.2;margin-bottom:3px}
.c-meta{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted)}
.c-meta .ct{color:var(--neon)}
.c-acts{display:flex;gap:4px;margin-top:6px}
.ca{flex:1;background:rgba(0,212,255,.15);border:1px solid var(--neon);color:var(--neon);padding:5px 0;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.ca:hover{background:var(--neon);color:var(--ink)}
.ca.bm{background:rgba(0,212,255,.06);border-color:var(--border);color:var(--muted);flex:0;padding:5px 9px}
.ca.bm:hover{border-color:var(--neon);color:var(--neon)}
.manga-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px}

/* ── LOADING ── */
.spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lw{display:none;flex-direction:column;align-items:center;gap:12px;padding:48px}
.lw.show{display:flex}
.lt{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--neon);text-transform:uppercase}
.ew{display:none;text-align:center;padding:36px;border-top:1px solid var(--border);margin-top:20px}
.ew.show{display:block}
.ew .et{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--aged)}
.empty-s{display:flex;flex-direction:column;align-items:center;gap:10px;padding:64px}
.empty-s i{font-size:38px;color:var(--border);margin-bottom:4px}
.empty-s .et{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px;color:var(--aged)}
.empty-s .es{font-size:13px;color:var(--muted);text-align:center;max-width:270px;line-height:1.6}

/* ── DETAILS ── */
.ov-page{position:fixed;inset:0;z-index:900;background:var(--ink);overflow-y:auto;display:none}
.ov-page.open{display:block}
.det-con{max-width:1050px;margin:0 auto;padding:72px 24px 60px}
.back-btn{display:inline-flex;align-items:center;gap:9px;background:transparent;border:1px solid var(--border);color:var(--aged);padding:7px 14px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:28px}
.back-btn:hover{border-color:var(--neon);color:var(--neon)}
.home-pill{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:1000;display:inline-flex;align-items:center;gap:7px;background:rgba(6,8,15,.88);border:1px solid var(--border);color:var(--muted);padding:6px 16px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(10px);transition:all .25s;border-radius:2px}
.home-pill:hover{border-color:var(--neon);color:var(--neon)}
.det-wrap{display:grid;grid-template-columns:210px 1fr;gap:32px}
.det-cover{border:2px solid var(--border);clip-path:polygon(0 0,90% 0,100% 10%,100% 100%,10% 100%,0 90%);overflow:hidden}
.det-cover img{width:100%;display:block}
.det-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(22px,4vw,44px);letter-spacing:2px;color:var(--paper);line-height:1;margin-bottom:10px}
.det-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.dch{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.dch i{color:var(--neon)}
.det-genres{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:16px}
.dg{border:1px solid var(--border);color:var(--aged);padding:3px 9px;font-size:11px;letter-spacing:1px;font-family:'Rajdhani',sans-serif;font-weight:600}
.det-syn{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:20px;border-left:3px solid var(--neon);padding-left:14px}
.det-acts{display:flex;gap:8px;margin-bottom:26px;flex-wrap:wrap}
.bp{background:var(--neon);border:2px solid var(--neon);color:var(--ink);padding:9px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;clip-path:polygon(0 0,94% 0,100% 20%,100% 100%,0 100%);font-weight:700}
.bp:hover{background:#33ddff}
.bo{background:transparent;border:2px solid var(--border);color:var(--aged);padding:9px 16px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.bo:hover{border-color:var(--neon);color:var(--neon)}
.ch-hd{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--paper);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ch-cnt{font-family:'Space Mono',monospace;font-size:9px;color:var(--neon);letter-spacing:1px}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:5px;max-height:280px;overflow-y:auto;padding-right:2px}
.chi{background:var(--panel);border:1px solid var(--border);color:var(--aged);padding:7px 10px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.chi:hover{border-color:var(--neon);color:var(--neon);background:rgba(0,212,255,.05)}
.chi.read{opacity:.38}
.chi.cur{border-color:var(--neon);background:rgba(0,212,255,.1);color:var(--neon)}

/* ── READER ── */
.reader-page{position:fixed;inset:0;z-index:950;background:#000;display:none;flex-direction:column}
.reader-page.open{display:flex}
.reader-hdr{height:50px;background:rgba(6,8,15,.98);border-bottom:2px solid var(--neon);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
.reader-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--paper);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.rctrl{display:flex;align-items:center;gap:5px;flex-shrink:0}
.rb{width:30px;height:30px;background:transparent;border:1px solid var(--border);color:var(--aged);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.rb:hover{border-color:var(--neon);color:var(--neon)}
#chind{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;white-space:nowrap;padding:0 3px}
.reader-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:10px 14px;gap:1px;background:#0a0a0a}
.reader-body img{max-width:800px;width:100%;display:block;min-height:100px;background:var(--panel)}

/* ── DOWNLOAD MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);z-index:1100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.mbox{background:var(--panel2);border:2px solid var(--neon);clip-path:polygon(0 0,96% 0,100% 4%,100% 100%,4% 100%,0 96%);width:430px;max-width:100%;overflow:hidden}
.mhdr{background:rgba(0,212,255,.07);border-bottom:1px solid var(--border);padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:2px;color:var(--paper);display:flex;align-items:center;gap:8px}
.mhdr h3 i{color:var(--neon)}
.mclose{background:transparent;border:1px solid var(--border);color:var(--muted);width:24px;height:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s}
.mclose:hover{border-color:var(--neon);color:var(--neon)}
.mbody{padding:18px}
.dl-info{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:14px;letter-spacing:1px;line-height:1.6}
.pbar{height:4px;background:var(--border);border-radius:2px;margin-bottom:7px}
.pfill{height:100%;background:linear-gradient(to right,var(--neon2),var(--neon));width:0%;transition:width .2s;border-radius:2px}
#ptxt{font-family:'Space Mono',monospace;font-size:10px;color:var(--neon);letter-spacing:1px}
.zip-btn{width:100%;background:var(--neon);border:none;color:var(--ink);padding:12px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;margin-top:12px;transition:all .2s}
.zip-btn:hover{background:#33ddff}
.zip-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── TOAST ── */
.toast-con{position:fixed;bottom:18px;right:18px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--neon);padding:10px 14px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;color:var(--paper);display:flex;align-items:center;gap:8px;animation:sIn .3s ease;min-width:220px}
.toast.s{border-left-color:#00ff88}.toast.w{border-left-color:#ffaa00}.toast.e{border-left-color:#ff4444}
@keyframes sIn{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
.btt{position:fixed;bottom:26px;left:26px;z-index:500;width:36px;height:36px;background:var(--neon);border:none;color:var(--ink);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;clip-path:polygon(50% 0%,100% 50%,85% 50%,85% 100%,15% 100%,15% 50%,0% 50%)}
.btt.show{display:flex}.btt:hover{background:#33ddff}

/* ── RESPONSIVE ── */
@media(max-width:800px){
  .nav-links{display:none;flex-direction:column;position:fixed;top:60px;left:0;right:0;background:var(--panel2);border-bottom:2px solid var(--neon);padding:12px;gap:5px;z-index:999}
  .nav-links.open{display:flex}
  .nav-links a{padding:10px 14px;border:1px solid var(--border);width:100%}
  .menu-toggle{display:flex}
  .hero-slider{height:50vh;min-height:300px}
  .slide-content{padding:0 16px 32px;max-width:100%}
  .slide-title{font-size:clamp(26px,8vw,44px)}
  .hero-bottom{left:16px}
  .content-area{padding:26px 12px 60px}
  .tab-content-area{padding:84px 12px 60px}

<script>
'use strict';
// ═══════════════════════════════════════════════════════════════
//  ANICADE MANGA ENGINE v6
//
//  PRIMARY: MangaHook API (mangahook-api.vercel.app)
//    - Built on mangakakalot.tv data
//    - Returns manga list, search, chapter list WITH PAGE IMAGES
//    - All endpoints return direct image URLs ready for <img> tags
//    - Fully CORS-enabled (Vercel serverless function)
//
//  METADATA: Jikan (MAL) for scores/ratings on hero/carousels
//
//  ENDPOINTS:
//    GET /api/mangaList?type=topview&page=N      -> list
//    GET /api/mangaList?type=newest&page=N       -> list
//    GET /api/mangaList?category=Action&page=N   -> genre list
//    GET /api/search?q=TITLE&page=N              -> search
//    GET /api/manga/MANGA_ID                     -> detail + chapters
//    GET /api/manga/MANGA_ID/CHAPTER_ID          -> page image URLs
//
//  RESPONSE /api/manga/ID/CHAPTER_ID:
//    { imageList: [{ image: "url" }] }
// ═══════════════════════════════════════════════════════════════

const MH = 'https://mangahook-api.vercel.app';
const $ = id => document.getElementById(id);

// ── UTILS ──
const bttEl=$('btt');
window.addEventListener('scroll',()=>bttEl.classList.toggle('show',window.scrollY>400));
bttEl.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));

function toast(msg,type=''){
  const t=document.createElement('div');
  t.className='toast'+(type==='success'?' s':type==='warning'?' w':type==='error'?' e':'');
  t.innerHTML='<i class="fas fa-'+(type==='success'?'check-circle':type==='error'?'times-circle':'info-circle')+'"></i> '+msg;
  $('toastCon').appendChild(t);setTimeout(()=>t.remove(),3400);
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── NAV / TABS ──
const navEl=$('navLinks');
$('menuToggle').addEventListener('click',()=>navEl.classList.toggle('open'));
navEl.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>navEl.classList.remove('open')));

function switchTab(name){
  $('detPage').classList.remove('open');
  $('readerPage').classList.remove('open');
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn,[data-tab]').forEach(b=>b.classList.remove('active'));
  $('tab-'+name)?.classList.add('active');
  document.querySelectorAll('[data-tab="'+name+'"]').forEach(el=>el.classList.add('active'));
  window.scrollTo(0,0);
  if(name==='bookmarks')renderBM();
  if(name==='downloads')renderDL();
}
document.querySelectorAll('[data-tab]').forEach(el=>{
  el.addEventListener('click',e=>{
    const t=el.dataset.tab;if(!t)return;
    if(el.tagName==='A'&&el.getAttribute('href')==='#')e.preventDefault();
    switchTab(t);navEl.classList.remove('open');
  });
});
$('detHome').addEventListener('click',()=>switchTab('home'));

// ═══════════════════════════════════════════════════════════════
//  API CALLS — all go to MangaHook (CORS-open Vercel function)
// ═══════════════════════════════════════════════════════════════
async function mhFetch(path){
  try{
    const r=await fetch(MH+path,{signal:AbortSignal.timeout(15000)});
    if(!r.ok)throw new Error('HTTP '+r.status);
    return await r.json();
  }catch(e){
    console.warn('MH fetch failed:',path,e.message);
    return null;
  }
}

// Map MangaHook manga object to our internal format
function mapMH(m){
  return{
    id: m.id||'',
    title: m.title||'Unknown',
    cover: fixImg(m.image||m.imageUrl||m.cover||''),
    genres: m.category?[m.category]:(m.genres||[]),
    status: m.status||'',
    chapters: m.chapter||m.latestChapter||'',
    description: m.description||m.content||'',
    views: m.view||m.views||'',
    rating: m.rate||m.score||null,
    type: m.type||'Manga',
    chapterList: m.chapterList||[]
  };
}

// MangaHook image URLs sometimes need the domain prepended
function fixImg(url){
  if(!url)return'https://placehold.co/300x400/0d1120/00d4ff?text=No+Cover';
  if(url.startsWith('http'))return url;
  return 'https://ww6.mangakakalot.tv'+url;
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let cache=[];
let curManga=null,curChapters=[],curChIdx=0,curPages=[];
let bPage=1,bLoad=false,bDone=false,bQuery='',bGenre='all';
let bookmarks=JSON.parse(localStorage.getItem('am_bm')||'[]');
let downloads=JSON.parse(localStorage.getItem('am_dl')||'[]');
const readH=JSON.parse(localStorage.getItem('am_rd')||'{}');
const saveBM=()=>localStorage.setItem('am_bm',JSON.stringify(bookmarks));
const saveDL=()=>localStorage.setItem('am_dl',JSON.stringify(downloads));
const saveRd=()=>localStorage.setItem('am_rd',JSON.stringify(readH));
function getM(id){return cache.find(x=>x.id===id)||bookmarks.find(x=>x.id===id)||downloads.find(x=>x.id===id);}
function toggleBM(m){const i=bookmarks.findIndex(b=>b.id===m.id);if(i>=0){bookmarks.splice(i,1);toast('Removed','warning');}else{bookmarks.push(m);toast('Bookmarked!','success');}saveBM();}

// ═══════════════════════════════════════════════════════════════
//  CARD BUILDER
// ═══════════════════════════════════════════════════════════════
function mkCard(m,g=false){
  const isBm=bookmarks.some(b=>b.id===m.id);
  const el=document.createElement('div');
  el.className='manga-card'+(g?' g':'');
  el.dataset.id=m.id;
  const genre=(m.genres||[])[0]||m.type||'Manga';
  el.innerHTML=
    '<div class="cf">'+
      '<img class="cc" src="'+m.cover+'" alt="'+esc(m.title)+'" loading="lazy" onerror="this.src=\'https://placehold.co/300x400/0d1120/00d4ff?text=No+Cover\'"/>'+
      (m.rating?'<div class="c-score"><i class="fas fa-star" style="font-size:8px"></i> '+parseFloat(m.rating).toFixed(1)+'</div>':'')+
      (m.type?'<div class="c-type">'+esc(m.type)+'</div>':'')+
      '<div class="co">'+
        '<div class="c-title">'+esc(m.title)+'</div>'+
        '<div class="c-meta"><span class="ct">'+esc(genre)+'</span>'+(m.chapters?' · '+esc(m.chapters):'')+'</div>'+
        '<div class="c-acts"><button class="ca rd-btn">Read</button><button class="ca bm bm-btn"><i class="fas fa-bookmark" style="color:'+(isBm?'var(--neon)':'inherit')+'"></i></button></div>'+
      '</div>'+
    '</div>';
  return el;
}

function attachEv(container){
  container.querySelectorAll('.manga-card').forEach(card=>{
    const gm=()=>getM(card.dataset.id);
    card.addEventListener('click',()=>{const m=gm();if(m)openDetails(m);});
    card.querySelector('.rd-btn')?.addEventListener('click',e=>{e.stopPropagation();const m=gm();if(m)openDetails(m);});
    card.querySelector('.bm-btn')?.addEventListener('click',e=>{
      e.stopPropagation();const m=gm();if(!m)return;
      toggleBM(m);card.querySelector('.bm-btn i').style.color=bookmarks.some(b=>b.id===m.id)?'var(--neon)':'inherit';
    });
  });
}

function renderBM(){const g=$('bmGrid'),e=$('bmEmpty');if(!bookmarks.length){g.innerHTML='';e.style.display='flex';return;}e.style.display='none';g.innerHTML='';bookmarks.forEach(m=>{if(!getM(m.id))cache.push(m);g.appendChild(mkCard(m,true));});attachEv(g);}
function renderDL(){const g=$('dlGrid'),e=$('dlEmpty');if(!downloads.length){g.innerHTML='';e.style.display='flex';return;}e.style.display='none';g.innerHTML='';downloads.forEach(m=>{if(!getM(m.id))cache.push(m);g.appendChild(mkCard(m,true));});attachEv(g);}

// ═══════════════════════════════════════════════════════════════
//  HERO SLIDER
// ═══════════════════════════════════════════════════════════════
let hItems=[],hIdx=0,hTimer=null;
const H_DUR=6500;

function mkSlide(m,idx){
  const el=document.createElement('div');
  el.className='hero-slide'+(idx===0?' active':'');
  el.innerHTML=
    '<div class="slide-bg" style="background-image:url(\''+m.cover+'\')"></div>'+
    '<div class="slide-overlay"></div>'+
    '<div class="slide-content">'+
      '<div class="slide-tag">Featured</div>'+
      '<div class="slide-badges">'+
        (m.type?'<span class="sl-b">'+esc(m.type)+'</span>':'')+
        (m.rating?'<span class="sl-b gold"><i class="fas fa-star"></i> '+parseFloat(m.rating).toFixed(1)+'</span>':'')+
        ((m.genres||[])[0]?'<span class="sl-b">'+esc((m.genres||[])[0])+'</span>':'')+
      '</div>'+
      '<div class="slide-title">'+esc(m.title)+'</div>'+
      (m.description?'<p class="slide-desc">'+esc(m.description.slice(0,150))+'…</p>':'')+
      '<div class="slide-acts">'+
        '<button class="sb h-read" data-id="'+m.id+'"><i class="fas fa-book-reader"></i> Read Now</button>'+
        '<button class="sb-o h-info" data-id="'+m.id+'"><i class="fas fa-info-circle"></i> Details</button>'+
      '</div>'+
    '</div>';
  el.querySelector('.h-read').addEventListener('click',()=>{const x=getM(m.id);if(x)openDetails(x);});
  el.querySelector('.h-info').addEventListener('click',()=>{const x=getM(m.id);if(x)openDetails(x);});
  return el;
}

function goSlide(idx){
  const slides=document.querySelectorAll('.hero-slide');
  if(!slides.length)return;
  slides[hIdx].classList.remove('active');
  hIdx=(idx+slides.length)%slides.length;
  slides[hIdx].classList.add('active');
  document.querySelectorAll('.s-dot').forEach((d,i)=>d.classList.toggle('active',i===hIdx));
  clearInterval(hTimer);
  hTimer=setInterval(()=>goSlide(hIdx+1),H_DUR);
}

async function initHero(){
  // Fetch top manga from MangaHook for hero slides
  const d=await mhFetch('/api/mangaList?type=topview&page=1');
  const loader=$('heroLoader');
  const items=(d?.mangaList||[]).slice(0,8).map(mapMH).filter(m=>m.id);
  if(!items.length){if(loader)loader.style.display='none';return;}
  hItems=items;
  hItems.forEach(m=>{if(!getM(m.id))cache.push(m);});
  const slider=$('heroSlider'),btm=$('heroBtm'),dots=$('heroDots');
  if(loader)loader.remove();
  hItems.forEach((m,i)=>slider.insertBefore(mkSlide(m,i),btm));
  btm.style.display='flex';
  hItems.forEach((_,i)=>{
    const d2=document.createElement('button');
    d2.className='s-dot'+(i===0?' active':'');
    d2.addEventListener('click',()=>goSlide(i));
    dots.appendChild(d2);
  });
  $('prevArr').addEventListener('click',()=>goSlide(hIdx-1));
  $('nextArr').addEventListener('click',()=>goSlide(hIdx+1));
  let tx=0;
  slider.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  slider.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50)goSlide(d>0?hIdx+1:hIdx-1);});
  hTimer=setInterval(()=>goSlide(hIdx+1),H_DUR);
}

// ═══════════════════════════════════════════════════════════════
//  CAROUSELS
// ═══════════════════════════════════════════════════════════════
async function loadCar(elId,path){
  const el=$(elId);if(!el)return;
  const d=await mhFetch(path);
  el.innerHTML='';
  const items=(d?.mangaList||[]).map(mapMH).filter(m=>m.id);
  if(!items.length){el.innerHTML='<span style="color:var(--muted);font-size:13px;padding:20px">Nothing to show</span>';return;}
  items.forEach((m,i)=>{
    if(!getM(m.id))cache.push(m);
    const c=mkCard(m);c.style.animationDelay=(i*.04)+'s';el.appendChild(c);
  });
  attachEv(el);
}

// ═══════════════════════════════════════════════════════════════
//  BROWSE + INFINITE SCROLL
// ═══════════════════════════════════════════════════════════════
async function loadBrowse(reset=false){
  if(bLoad)return;if(bDone&&!reset)return;
  bLoad=true;$('lw').classList.add('show');
  if(reset){bPage=1;bDone=false;$('browseGrid').innerHTML='';$('ew').classList.remove('show');}

  let path;
  if(bQuery){
    path='/api/search?q='+encodeURIComponent(bQuery)+'&page='+bPage;
  }else if(bGenre!=='all'){
    path='/api/mangaList?category='+encodeURIComponent(bGenre)+'&page='+bPage;
  }else{
    path='/api/mangaList?type=newest&page='+bPage;
  }

  const d=await mhFetch(path);
  const items=(d?.mangaList||d?.data||[]).map(mapMH).filter(m=>m.id);
  const totalPages=d?.metaData?.totalPages||d?.totalPages||1;
  bPage++;
  if(items.length<5||bPage>totalPages){bDone=true;$('ew').classList.add('show');}

  items.forEach((m,i)=>{
    if(!getM(m.id))cache.push(m);
    const el=mkCard(m,true);el.style.animationDelay=(i*.025)+'s';
    $('browseGrid').appendChild(el);
  });
  attachEv($('browseGrid'));
  $('lw').classList.remove('show');
  bLoad=false;
  if(!bDone&&document.body.scrollHeight<=window.innerHeight+50)loadBrowse();
}

window.addEventListener('scroll',()=>{
  if(!$('tab-home')?.classList.contains('active'))return;
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-800)loadBrowse();
});

$('searchBtn').addEventListener('click',()=>{
  bQuery=$('searchInput').value.trim();bGenre='all';
  document.querySelectorAll('.gc').forEach(b=>b.classList.remove('active'));
  document.querySelector('.gc[data-genre="all"]').classList.add('active');
  loadBrowse(true);
});
$('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')$('searchBtn').click();});

document.querySelectorAll('.gc').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.gc').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    bGenre=btn.dataset.genre;bQuery='';$('searchInput').value='';
    loadBrowse(true);
  });
});

// ═══════════════════════════════════════════════════════════════
//  DETAILS — fetches chapter list from MangaHook /api/manga/ID
// ═══════════════════════════════════════════════════════════════
async function openDetails(manga){
  curManga=manga;curChapters=[];
  const isBm=bookmarks.some(b=>b.id===manga.id);
  $('detWrap').innerHTML=
    '<div><div class="det-cover"><img src="'+manga.cover+'" alt="'+esc(manga.title)+'" onerror="this.src=\'https://placehold.co/300x400/0d1120/00d4ff?text=No+Cover\'"/></div></div>'+
    '<div id="detInfo">'+
      '<h1 class="det-title">'+esc(manga.title)+'</h1>'+
      '<div class="det-chips">'+
        (manga.rating?'<span class="dch"><i class="fas fa-star"></i> '+parseFloat(manga.rating).toFixed(1)+'/10</span>':'')+
        (manga.status?'<span class="dch"><i class="fas fa-circle" style="font-size:8px"></i> '+esc(manga.status)+'</span>':'')+
        (manga.views?'<span class="dch"><i class="fas fa-eye"></i> '+esc(manga.views)+'</span>':'')+
        (manga.type?'<span class="dch"><i class="fas fa-tag"></i> '+esc(manga.type)+'</span>':'')+
      '</div>'+
      '<div class="det-genres">'+(manga.genres||[]).map(g=>'<span class="dg">'+esc(g)+'</span>').join('')+'</div>'+
      '<p class="det-syn">'+(manga.description||'No synopsis available.').slice(0,460)+'…</p>'+
      '<div class="det-acts">'+
        '<button class="bp" id="detRead"><i class="fas fa-book-reader"></i> Start Reading</button>'+
        '<button class="bo bm-det"><i class="fas fa-bookmark"></i> '+(isBm?'Bookmarked':'Bookmark')+'</button>'+
      '</div>'+
      '<div class="ch-hd">CHAPTERS <span class="ch-cnt" id="chCnt">Loading…</span></div>'+
      '<div class="ch-grid" id="chGrid">'+
        '<div style="grid-column:1/-1;padding:14px;font-family:\'Space Mono\',monospace;font-size:10px;color:var(--neon);letter-spacing:2px;display:flex;align-items:center;gap:8px">'+
          '<div class="spinner" style="width:14px;height:14px;border-width:2px;flex-shrink:0"></div> Fetching chapters…'+
        '</div>'+
      '</div>'+
    '</div>';

  $('detPage').classList.add('open');
  $('detPage').scrollTop=0;

  $('detRead').addEventListener('click',()=>{if(curChapters.length)openReader(0);else toast('Loading chapters…','warning');});
  $('detWrap').querySelector('.bm-det').addEventListener('click',function(){
    toggleBM(manga);this.innerHTML='<i class="fas fa-bookmark"></i> '+(bookmarks.some(b=>b.id===manga.id)?'Bookmarked':'Bookmark');
  });

  // Fetch manga detail from MangaHook to get chapter list
  const cg=$('chGrid'),cc=$('chCnt');
  const d=await mhFetch('/api/manga/'+encodeURIComponent(manga.id));

  if(!d){
    cc.textContent='Error';
    cg.innerHTML='<div style="grid-column:1/-1;padding:14px;font-family:\'Space Mono\',monospace;font-size:10px;color:var(--muted)">Failed to load. Check connection and try again.</div>';
    return;
  }

  // Update manga details with fresh data
  if(d.description&&!manga.description)manga.description=d.description;
  if(d.category&&!manga.genres?.length)manga.genres=[d.category];
  if(d.status)manga.status=d.status;

  // Chapter list: MangaHook returns chapterList:[{id, title, chapter}]
  const chapters=(d.chapterList||d.chapters||[]);
  curChapters=chapters.map(c=>({
    id: c.id||c.chapterId||'',
    chapter: c.chapter||c.num||'?',
    title: c.title||c.name||''
  })).filter(c=>c.id);

  cc.textContent=curChapters.length+' chapters';
  if(!curChapters.length){
    cg.innerHTML='<div style="grid-column:1/-1;padding:14px;font-family:\'Space Mono\',monospace;font-size:10px;color:var(--muted)">No chapters found for this title.</div>';
    return;
  }

  let html='';
  curChapters.forEach((c,i)=>{
    const rd=!!readH[c.id];
    html+='<div class="chi'+(rd?' read':'')+'" data-idx="'+i+'">'+
      '<span>'+esc(c.chapter)+(c.title?' · '+esc(c.title.slice(0,16)):'')+'</span>'+
      '<i class="fas fa-chevron-right" style="font-size:8px;color:var(--border)"></i>'+
    '</div>';
  });
  cg.innerHTML=html;
  cg.querySelectorAll('.chi').forEach(item=>item.addEventListener('click',()=>openReader(parseInt(item.dataset.idx))));
}

$('backDet').addEventListener('click',()=>$('detPage').classList.remove('open'));

// ═══════════════════════════════════════════════════════════════
//  READER — fetches page images from MangaHook /api/manga/ID/CHAPTER_ID
// ═══════════════════════════════════════════════════════════════
async function openReader(chIdx){
  curChIdx=chIdx;
  const chap=curChapters[chIdx];if(!chap)return;
  $('readerTitle').textContent=curManga.title+' — Ch.'+chap.chapter+(chap.title?' · '+chap.title:'');
  $('chind').textContent='Ch '+chap.chapter+' ('+(chIdx+1)+'/'+curChapters.length+')';
  const body=$('readerBody');
  body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:72px;color:var(--neon);font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:2px;text-align:center"><div class="spinner" style="border-top-color:var(--neon)"></div>LOADING PAGES…</div>';
  $('detPage').classList.remove('open');
  $('readerPage').classList.add('open');
  body.scrollTop=0;

  readH[chap.id]=true;saveRd();
  document.querySelectorAll('.chi').forEach(el=>{
    const i=parseInt(el.dataset.idx);
    el.classList.toggle('read',true);
    el.classList.toggle('cur',i===chIdx);
  });

  // Fetch chapter pages from MangaHook
  // Endpoint: GET /api/manga/{mangaId}/{chapterId}
  // Returns: { imageList: [{ image: "https://..." }] }
  const d=await mhFetch('/api/manga/'+encodeURIComponent(curManga.id)+'/'+encodeURIComponent(chap.id));
  const pages=(d?.imageList||d?.images||d?.pageList||[]).map(p=>{
    const url=p.image||p.url||p.src||p||'';
    return fixImg(url);
  }).filter(u=>u&&!u.includes('placehold'));
  curPages=pages;

  if(pages.length){
    body.innerHTML='';
    pages.forEach((url,i)=>{
      const img=document.createElement('img');
      img.alt='Page '+(i+1);
      img.loading=i<4?'eager':'lazy';
      img.style.cssText='max-width:800px;width:100%;display:block;';
      img.onerror=function(){
        // On error, try loading without the fixed domain
        if(!this.dataset.tried){
          this.dataset.tried='1';
          // Try the URL through a CORS proxy
          this.src='https://images.weserv.nl/?url='+encodeURIComponent(url)+'&w=800';
        }
      };
      img.src=url;
      body.appendChild(img);
    });
    toast('Loaded '+pages.length+' pages','success');
  }else{
    body.innerHTML=
      '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:72px 20px;text-align:center;max-width:420px;margin:0 auto">'+
        '<i class="fas fa-exclamation-circle" style="font-size:40px;color:var(--neon);opacity:.35"></i>'+
        '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:18px;letter-spacing:3px;color:var(--paper)">Pages Failed to Load</div>'+
        '<div style="font-family:\'Space Mono\',monospace;font-size:10px;color:var(--muted);line-height:1.8">The chapter may be unavailable right now.<br>Retry or try the next chapter.</div>'+
        '<div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;justify-content:center">'+
          '<button onclick="openReader(curChIdx)" style="background:rgba(0,212,255,.15);border:1px solid var(--neon);color:var(--neon);padding:9px 18px;font-family:\'Bebas Neue\',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer"><i class="fas fa-redo"></i> Retry</button>'+
          (chIdx<curChapters.length-1?'<button onclick="openReader(curChIdx+1)" style="background:rgba(0,212,255,.08);border:1px solid var(--border);color:var(--aged);padding:9px 18px;font-family:\'Bebas Neue\',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer">Next Ch <i class="fas fa-chevron-right"></i></button>':'')+
        '</div>'+
      '</div>';
  }
}

$('prevCh').addEventListener('click',()=>{if(curChIdx>0)openReader(curChIdx-1);else toast('First chapter','warning');});
$('nextCh').addEventListener('click',()=>{if(curChIdx<curChapters.length-1)openReader(curChIdx+1);else toast('Last chapter','warning');});
$('backReader').addEventListener('click',()=>{$('readerPage').classList.remove('open');if(curManga)$('detPage').classList.add('open');});

// ═══════════════════════════════════════════════════════════════
//  DOWNLOAD — JSZip, proxied image blob fetch
// ═══════════════════════════════════════════════════════════════
$('dlCh').addEventListener('click',()=>{
  if(!curPages.length){toast('No pages loaded yet','warning');return;}
  const chap=curChapters[curChIdx];
  $('dlInfo').innerHTML=
    '<strong style="color:var(--paper)">'+esc(curManga.title)+'</strong><br>'+
    'Chapter '+esc(chap.chapter)+(chap.title?' — '+esc(chap.title):'')+
    '<br><span style="color:var(--neon)">'+curPages.length+' pages to download</span>';
  $('pWrap').style.display='none';
  $('pFill').style.width='0%';
  const btn=$('startZip');btn.disabled=false;
  btn.innerHTML='<i class="fas fa-file-archive"></i> Download All Pages as ZIP';
  $('dlModal').classList.add('open');
});
$('closeDl').addEventListener('click',()=>$('dlModal').classList.remove('open'));
$('dlModal').addEventListener('click',e=>{if(e.target===$('dlModal'))$('dlModal').classList.remove('open');});

$('startZip').addEventListener('click',async()=>{
  if(!curPages.length){toast('No pages','error');return;}
  const btn=$('startZip'),pw=$('pWrap'),pf=$('pFill'),pt=$('ptxt');
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Preparing…';
  pw.style.display='block';pf.style.width='0%';pt.textContent='Loading JSZip…';
  try{
    if(!window.JSZip){
      await new Promise((res,rej)=>{const s=document.createElement('script');s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';s.onload=res;s.onerror=rej;document.head.appendChild(s);});
    }
    const zip=new window.JSZip();
    const chap=curChapters[curChIdx];
    const safe=(curManga.title||'manga').replace(/[^a-z0-9]/gi,'_');
    const folder=zip.folder(safe+'_Ch'+(chap?.chapter||'0'));
    const total=curPages.length;let done=0;pt.textContent='0 / '+total;

    for(let i=0;i<curPages.length;i++){
      const raw=curPages[i];
      const ext=(raw.split('?')[0].split('.').pop()||'jpg').replace(/[^a-zA-Z]/g,'').slice(0,4)||'jpg';
      const fname='page_'+String(i+1).padStart(3,'0')+'.'+ext;
      let blob=null;
      // Try multiple image proxy services
      const proxies=[
        'https://images.weserv.nl/?url='+encodeURIComponent(raw)+'&w=800',
        'https://corsproxy.io/?'+encodeURIComponent(raw),
        'https://api.allorigins.win/raw?url='+encodeURIComponent(raw),
        raw
      ];
      for(const u of proxies){
        try{
          const ctrl=new AbortController();
          const tid=setTimeout(()=>ctrl.abort(),16000);
          const r=await fetch(u,{signal:ctrl.signal});
          clearTimeout(tid);
          if(r.ok){blob=await r.blob();break;}
        }catch(e){}
      }
      if(blob)folder.file(fname,blob);
      done++;const pct=Math.round((done/total)*100);
      pf.style.width=pct+'%';pt.textContent=done+' / '+total+' ('+pct+'%)';
    }

    pt.textContent='Creating ZIP…';pf.style.width='95%';
    const zb=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:3}});
    pf.style.width='100%';pt.textContent='Done!';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(zb);
    a.download=safe+'_Ch'+(chap?.chapter||'0')+'.zip';
    document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);document.body.removeChild(a);
    if(!downloads.find(d=>d.id===curManga.id)){downloads.push(curManga);saveDL();}
    toast('Downloaded '+total+' pages!','success');
    setTimeout(()=>$('dlModal').classList.remove('open'),1500);
  }catch(err){
    toast('Download failed','error');pt.textContent='Error: '+err.message;
  }
  btn.disabled=false;btn.innerHTML='<i class="fas fa-file-archive"></i> Download All Pages as ZIP';
});

// ═══════════════════════════════════════════════════════════════
//  INIT — all parallel, hero first
// ═══════════════════════════════════════════════════════════════
initHero();
Promise.all([
  loadCar('newCar','/api/mangaList?type=newest&page=1'),
  loadCar('topCar','/api/mangaList?type=topview&page=1'),
  loadBrowse(true),
]);
renderBM();
renderDL();
</script>
