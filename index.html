<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>ANICADE MANGA</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#06080f;--panel:#0d1120;--panel2:#111827;--border:#1e2d4a;
  --paper:#e8eef8;--aged:#a8b8d0;--muted:#546480;
  --neon:#00d4ff;--neon2:#0099cc;--neon-glow:rgba(0,212,255,.25);
}
html{scroll-behavior:smooth}
body{background:var(--ink);color:var(--paper);font-family:'Rajdhani',sans-serif;font-size:16px;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(0,212,255,.015) 1px,transparent 1px);background-size:6px 6px;pointer-events:none;z-index:0}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--ink)}
::-webkit-scrollbar-thumb{background:var(--neon);border-radius:3px}

/* ── NAV ── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;height:60px;display:flex;align-items:center;background:rgba(6,8,15,.97);border-bottom:2px solid var(--neon);backdrop-filter:blur(14px);padding:0 24px;box-shadow:0 0 30px rgba(0,212,255,.12)}
.nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.brand-logo{height:38px;border-radius:4px}
.brand-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:3px;color:var(--paper);line-height:1}
.brand-name .bh{color:var(--neon);text-shadow:0 0 12px var(--neon)}
.nav-links{display:flex;align-items:center;gap:2px;margin-left:auto}
.nav-links a{display:flex;align-items:center;gap:6px;padding:7px 12px;color:var(--aged);text-decoration:none;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;border:1px solid transparent;transition:all .2s}
.nav-links a:hover,.nav-links a.active{color:var(--neon);border-color:var(--border);background:rgba(0,212,255,.07)}
.nav-links a.hub-btn{background:rgba(0,212,255,.12);color:var(--neon);border-color:var(--neon);clip-path:polygon(0 0,94% 0,100% 20%,100% 100%,6% 100%,0 80%)}
.nav-links a.hub-btn:hover{background:rgba(0,212,255,.25)}
.menu-toggle{width:34px;height:34px;border:1px solid var(--border);background:transparent;color:var(--aged);cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;margin-left:10px;font-size:14px}
.menu-toggle:hover{color:var(--neon);border-color:var(--neon)}

/* ── TAB BAR ── */
.tab-bar{position:fixed;top:60px;left:0;right:0;z-index:990;background:rgba(6,8,15,.95);border-bottom:1px solid var(--border);display:flex;backdrop-filter:blur(10px)}
.tab-btn{flex:1;padding:10px 0;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:2px;color:var(--muted);background:transparent;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px;border-bottom:3px solid transparent}
.tab-btn:hover{color:var(--aged)}
.tab-btn.active{color:var(--neon);border-bottom-color:var(--neon)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* ══ HERO — compact Netflix style, ~55vh ══ */
.hero-slider{position:relative;width:100%;height:58vh;min-height:380px;max-height:520px;overflow:hidden;margin-top:98px}
.hero-slide{position:absolute;inset:0;opacity:0;transition:opacity .8s ease;pointer-events:none;z-index:1}
.hero-slide.active{opacity:1;pointer-events:all;z-index:2}
.slide-bg{position:absolute;inset:0;background-size:cover;background-position:center 20%;filter:brightness(.45) saturate(1.1)}
.slide-overlay{position:absolute;inset:0;background:
  linear-gradient(to right,rgba(6,8,15,.96) 0%,rgba(6,8,15,.7) 40%,rgba(6,8,15,.1) 70%,transparent 100%),
  linear-gradient(to top,rgba(6,8,15,.85) 0%,transparent 50%)}
.slide-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;padding:0 52px 40px;max-width:560px;z-index:3}
.slide-eyebrow{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--neon);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.slide-eyebrow::before{content:'';display:block;width:24px;height:2px;background:var(--neon)}
.slide-badges{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.sl-badge{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--neon);background:rgba(0,212,255,.1);border:1px solid rgba(0,212,255,.3);padding:2px 7px}
.sl-badge.gold{color:#ffd700;background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.3)}
.slide-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(32px,5vw,62px);letter-spacing:0;color:var(--paper);line-height:.95;margin-bottom:10px;text-shadow:0 2px 16px rgba(0,0,0,.6)}
.slide-desc{font-size:13px;color:var(--aged);line-height:1.65;margin-bottom:18px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.slide-acts{display:flex;gap:8px}
.sh-btn{background:var(--neon);border:none;color:var(--ink);padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s;clip-path:polygon(0 0,93% 0,100% 18%,100% 100%,0 100%);font-weight:700}
.sh-btn:hover{background:#33ddff;box-shadow:0 0 18px var(--neon-glow)}
.sh-btn-out{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.25);color:var(--paper);padding:10px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;display:inline-flex;align-items:center;gap:7px;transition:all .2s;border-radius:2px}
.sh-btn-out:hover{border-color:var(--neon);color:var(--neon)}
/* Arrows + dots — bottom left */
.slider-controls{position:absolute;bottom:16px;left:52px;z-index:10;display:flex;align-items:center;gap:10px}
.s-arr{width:34px;height:34px;background:rgba(6,8,15,.7);border:1px solid var(--border);color:var(--aged);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .2s;border-radius:2px}
.s-arr:hover{border-color:var(--neon);color:var(--neon)}
.slider-dots{display:flex;gap:6px;align-items:center}
.s-dot{width:20px;height:2px;background:rgba(255,255,255,.2);cursor:pointer;border:none;padding:0;border-radius:1px;transition:all .3s}
.s-dot.active{background:var(--neon);width:36px}

/* ── CONTENT ── */
.content-area{max-width:1400px;margin:0 auto;padding:36px 32px 80px;position:relative;z-index:2}
.tab-content-area{max-width:1400px;margin:0 auto;padding:92px 32px 80px}

/* ── SECTION HEADERS ── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-head-left{display:flex;align-items:center;gap:10px}
.sec-num{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:3px;color:var(--neon);background:rgba(0,212,255,.08);border:1px solid var(--neon);padding:2px 6px}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:var(--paper)}
.sec-title .acc{color:var(--neon)}
.sec-block{margin-bottom:44px}

/* ── CAROUSEL ── */
.h-car{display:flex;gap:12px;overflow-x:auto;scroll-snap-type:x mandatory;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.h-car::-webkit-scrollbar{height:3px}
.h-car::-webkit-scrollbar-thumb{background:var(--neon)}

/* ── GENRE CHIPS ── */
.genre-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:24px}
.g-chip{background:transparent;border:1px solid var(--border);color:var(--muted);padding:5px 12px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;white-space:nowrap}
.g-chip::before{content:'';position:absolute;inset:0;background:var(--neon);transform:scaleX(0);transform-origin:left;transition:transform .2s;z-index:-1}
.g-chip:hover::before,.g-chip.active::before{transform:scaleX(1)}
.g-chip:hover,.g-chip.active{color:var(--ink);border-color:var(--neon)}

/* ── SEARCH ── */
.search-row{display:flex;max-width:480px;margin-bottom:24px}
.search-row input{flex:1;background:rgba(0,212,255,.05);border:2px solid var(--border);border-right:none;color:var(--paper);padding:11px 14px;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;transition:border-color .2s;min-width:0}
.search-row input::placeholder{color:var(--muted)}
.search-row input:focus{border-color:var(--neon)}
.search-row button{background:var(--neon);border:none;color:var(--ink);padding:11px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;font-weight:700}
.search-row button:hover{background:#33ddff}

/* ── MANGA CARD ── */
.manga-card{flex-shrink:0;width:148px;scroll-snap-align:start;cursor:pointer}
.manga-card.grid-card{width:100%;flex-shrink:1}
.card-frame{border:2px solid var(--border);overflow:hidden;position:relative;aspect-ratio:3/4;background:var(--panel);transition:border-color .2s,box-shadow .2s;clip-path:polygon(0 0,91% 0,100% 9%,100% 100%,9% 100%,0 91%)}
.manga-card:hover .card-frame{border-color:var(--neon);box-shadow:0 0 16px rgba(0,212,255,.18)}
.manga-card:hover .card-cover{transform:scale(1.05)}
.manga-card:hover .card-overlay{opacity:1}
.card-cover{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(6,8,15,.97) 0%,rgba(6,8,15,.25) 55%,transparent 100%);opacity:.72;transition:opacity .22s;display:flex;flex-direction:column;justify-content:flex-end;padding:10px}
.card-score{position:absolute;top:7px;left:7px;background:rgba(0,0,0,.78);border:1px solid var(--neon);color:var(--neon);font-family:'Space Mono',monospace;font-size:9px;padding:2px 5px;display:flex;align-items:center;gap:3px}
.card-type{position:absolute;top:7px;right:7px;background:var(--neon);color:var(--ink);font-family:'Bebas Neue',sans-serif;font-size:9px;letter-spacing:1px;padding:2px 5px;font-weight:700}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:.8px;color:var(--paper);line-height:1.2;margin-bottom:3px}
.card-meta{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted)}
.card-meta .ctag{color:var(--neon)}
.card-acts{display:flex;gap:4px;margin-top:6px}
.c-btn{flex:1;background:rgba(0,212,255,.15);border:1px solid var(--neon);color:var(--neon);padding:5px 0;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;text-align:center}
.c-btn:hover{background:var(--neon);color:var(--ink)}
.c-btn.bm{background:rgba(0,212,255,.06);border-color:var(--border);color:var(--muted);flex:0;padding:5px 9px}
.c-btn.bm:hover{border-color:var(--neon);color:var(--neon)}

/* ── MANGA GRID ── */
.manga-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:14px}

/* ── LOADING ── */
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--neon);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-wrap{display:none;flex-direction:column;align-items:center;gap:12px;padding:50px}
.load-wrap.show{display:flex}
.load-txt{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--neon);text-transform:uppercase}
.end-wrap{display:none;text-align:center;padding:40px;border-top:1px solid var(--border);margin-top:24px}
.end-wrap.show{display:block}
.end-wrap .et{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;color:var(--aged)}
.empty-s{display:flex;flex-direction:column;align-items:center;gap:10px;padding:70px}
.empty-s i{font-size:42px;color:var(--border);margin-bottom:4px}
.empty-s .et{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--aged)}
.empty-s .es{font-size:13px;color:var(--muted);text-align:center;max-width:280px;line-height:1.6}

/* ── DETAILS OVERLAY ── */
.ov-page{position:fixed;inset:0;z-index:900;background:var(--ink);overflow-y:auto;display:none}
.ov-page.open{display:block}
.det-con{max-width:1050px;margin:0 auto;padding:76px 28px 60px}
.back-btn{display:inline-flex;align-items:center;gap:9px;background:transparent;border:1px solid var(--border);color:var(--aged);padding:8px 16px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:13px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;margin-bottom:30px}
.back-btn:hover{border-color:var(--neon);color:var(--neon)}
.home-pill{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:1000;display:inline-flex;align-items:center;gap:7px;background:rgba(6,8,15,.88);border:1px solid var(--border);color:var(--muted);padding:6px 16px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:12px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(10px);transition:all .25s;border-radius:2px}
.home-pill:hover{border-color:var(--neon);color:var(--neon)}
.det-wrap{display:grid;grid-template-columns:220px 1fr;gap:36px}
.det-cover{border:2px solid var(--border);clip-path:polygon(0 0,90% 0,100% 10%,100% 100%,10% 100%,0 90%);overflow:hidden}
.det-cover img{width:100%;display:block}
.det-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4vw,46px);letter-spacing:2px;color:var(--paper);line-height:1;margin-bottom:10px}
.det-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.det-chip{display:flex;align-items:center;gap:5px;font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)}
.det-chip i{color:var(--neon)}
.det-genres{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.det-genre{border:1px solid var(--border);color:var(--aged);padding:3px 10px;font-size:11px;letter-spacing:1px;font-family:'Rajdhani',sans-serif;font-weight:600}
.det-syn{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:22px;border-left:3px solid var(--neon);padding-left:14px}
.det-acts{display:flex;gap:8px;margin-bottom:28px;flex-wrap:wrap}
.btn-p{background:var(--neon);border:2px solid var(--neon);color:var(--ink);padding:10px 20px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all .2s;clip-path:polygon(0 0,94% 0,100% 20%,100% 100%,0 100%);font-weight:700}
.btn-p:hover{background:#33ddff}
.btn-o{background:transparent;border:2px solid var(--border);color:var(--aged);padding:10px 18px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.btn-o:hover{border-color:var(--neon);color:var(--neon)}
.ch-title{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:3px;color:var(--paper);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.ch-count{font-family:'Space Mono',monospace;font-size:9px;color:var(--neon);letter-spacing:1px}
.ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:6px;max-height:300px;overflow-y:auto;padding-right:4px}
.ch-item{background:var(--panel);border:1px solid var(--border);color:var(--aged);padding:8px 11px;font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .2s}
.ch-item:hover{border-color:var(--neon);color:var(--neon);background:rgba(0,212,255,.05)}
.ch-item.read{opacity:.4}
.ch-item.active{border-color:var(--neon);background:rgba(0,212,255,.1);color:var(--neon)}

/* ── READER ── */
.reader-page{position:fixed;inset:0;z-index:950;background:#000;display:none;flex-direction:column}
.reader-page.open{display:flex}
.reader-hdr{height:52px;background:rgba(6,8,15,.98);border-bottom:2px solid var(--neon);display:flex;align-items:center;padding:0 16px;gap:10px;flex-shrink:0}
.reader-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--paper);flex:1;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.r-ctrl{display:flex;align-items:center;gap:6px;flex-shrink:0}
.r-btn{width:32px;height:32px;background:transparent;border:1px solid var(--border);color:var(--aged);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:12px}
.r-btn:hover{border-color:var(--neon);color:var(--neon)}
#ch-ind{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;white-space:nowrap;padding:0 4px}
.reader-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:12px 16px;gap:2px;background:#0a0a0a}
.reader-body img{max-width:800px;width:100%;display:block}
.reader-body img.loading-img{background:var(--panel);min-height:200px}

/* ── DOWNLOAD MODAL ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(5px);z-index:1100;display:none;align-items:center;justify-content:center;padding:16px}
.modal-ov.open{display:flex}
.modal-box{background:var(--panel2);border:2px solid var(--neon);clip-path:polygon(0 0,96% 0,100% 4%,100% 100%,4% 100%,0 96%);width:440px;max-width:100%;overflow:hidden;box-shadow:0 0 40px rgba(0,212,255,.18)}
.modal-hdr{background:rgba(0,212,255,.07);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between}
.modal-hdr h3{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;color:var(--paper);display:flex;align-items:center;gap:8px}
.modal-hdr h3 i{color:var(--neon)}
.modal-close{background:transparent;border:1px solid var(--border);color:var(--muted);width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;transition:all .2s}
.modal-close:hover{border-color:var(--neon);color:var(--neon)}
.modal-body{padding:20px}
.dl-info{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:16px;letter-spacing:1px;line-height:1.6}
.prog-bar{height:4px;background:var(--border);border-radius:2px;margin-bottom:7px}
.prog-fill{height:100%;background:linear-gradient(to right,var(--neon2),var(--neon));width:0%;transition:width .2s;border-radius:2px}
#prog-txt{font-family:'Space Mono',monospace;font-size:10px;color:var(--neon);letter-spacing:1px}
.dl-zip-btn{width:100%;background:var(--neon);border:none;color:var(--ink);padding:13px;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;margin-top:14px;transition:all .2s}
.dl-zip-btn:hover{background:#33ddff}
.dl-zip-btn:disabled{opacity:.5;cursor:not-allowed}

/* ── TOAST ── */
.toast-con{position:fixed;bottom:20px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel2);border:1px solid var(--border);border-left:3px solid var(--neon);padding:10px 16px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:14px;color:var(--paper);display:flex;align-items:center;gap:8px;animation:slideIn .3s ease;min-width:240px}
.toast.s{border-left-color:#00ff88}
.toast.w{border-left-color:#ffaa00}
.toast.e{border-left-color:#ff4444}
@keyframes slideIn{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
.btt{position:fixed;bottom:28px;left:28px;z-index:500;width:38px;height:38px;background:var(--neon);border:none;color:var(--ink);cursor:pointer;display:none;align-items:center;justify-content:center;font-size:14px;clip-path:polygon(50% 0%,100% 50%,85% 50%,85% 100%,15% 100%,15% 50%,0% 50%)}
.btt.show{display:flex}
.btt:hover{background:#33ddff}

/* ── RESPONSIVE ── */
@media(max-width:800px){

// ═══════════════════════════════════════════════════════════════
//  ANICADE MANGA ENGINE v5
//
//  ARCHITECTURE (proven to work from browser):
//  • Browse/Search/Hero: Jikan (MAL) API — no CORS issues ever
//  • Chapter search:     MangaDex /manga?title= — CORS-open for browsers
//                        Uses direct fetch() — no proxy needed
//  • Chapter list:       MangaDex /manga/{id}/feed — direct fetch()
//  • Page images:        MangaDex at-home CDN — loaded via <img> tag
//                        (img tags bypass CORS entirely)
//  • ZIP download:       Proxied fetch of image URLs for blob access
//
//  WHY PREVIOUS VERSIONS FAILED:
//  Wrapping MDX calls in CORS proxies (corsproxy.io, allorigins)
//  caused the proxies themselves to 403 on MangaDex requests.
//  Solution: call MDX directly from the browser. It works.
// ═══════════════════════════════════════════════════════════════

// ── UTILS ──

// ═══════════════════════════════════════════════════════════════
//  JIKAN — browse, hero, carousels (confirmed CORS-free)
// ═══════════════════════════════════════════════════════════════
const JIKAN='https://api.jikan.moe/v4';
let _jq=Promise.resolve();
function jFetch(url){
  _jq=_jq.then(()=>new Promise(r=>setTimeout(r,350)));
  return _jq.then(()=>fetch(url).then(r=>r.ok?r.json():null).catch(()=>null));
}
const G={action:1,adventure:2,comedy:4,drama:8,fantasy:10,horror:14,mystery:7,romance:22,'sci-fi':24,'slice of life':36,sports:30,supernatural:37,thriller:41,psychological:40,mecha:18,historical:13};

function mapJ(m){
  return{
    id:String(m.mal_id),malId:m.mal_id,
    title:m.title_english||m.title||'Unknown',
    titleAlt:m.title||m.title_english||'',
    titleJp:m.title_japanese||'',
    cover:m.images?.jpg?.large_image_url||m.images?.jpg?.image_url||'https://placehold.co/300x400/0d1120/00d4ff?text=No+Cover',
    genres:(m.genres||[]).map(g=>g.name),
    status:m.status||'',
    chapters:m.chapters?String(m.chapters):'',
    description:(m.synopsis||'').replace(/\[Written.*?\]/gi,'').trim(),
    year:m.published?.prop?.from?.year||'',
    rating:m.score?String(m.score):null,
    type:m.type||'Manga'
  };
}

async function jBrowse(page=1,query='',genre='all'){
  let url=JIKAN+'/manga?page='+page+'&limit=24&sfw=true&order_by=popularity&sort=asc';
  if(query)url=JIKAN+'/manga?q='+encodeURIComponent(query)+'&page='+page+'&limit=24&sfw=true';
  else if(genre!=='all'&&G[genre])url+=('&genres='+G[genre]);
  const d=await jFetch(url);
  if(!d?.data)return{items:[],hasNext:false};
  return{items:d.data.map(mapJ),hasNext:d.pagination?.has_next_page||false};
}

// ═══════════════════════════════════════════════════════════════
//  MANGADEX — direct fetch() from browser (CORS is open)
//  MangaDex explicitly supports CORS for all browser origins.
//  Do NOT wrap in any proxy — proxies themselves block MDX.
// ═══════════════════════════════════════════════════════════════
const MDX='https://api.mangadex.org';
const CR='&contentRating[]=safe&contentRating[]=suggestive&contentRating[]=erotica';

async function mdxFind(manga){
  // Build search title variants — try each until one matches
  const tries=[
    manga.title,
    manga.titleAlt,
    manga.title?.split(':')[0]?.trim(),
    manga.titleAlt?.split(':')[0]?.trim(),
    manga.title?.replace(/\s+(season|part|vol\.?\s*\d+)/gi,'').trim(),
  ].filter((t,i,a)=>t&&t.length>1&&a.indexOf(t)===i);

  for(const t of tries){
    try{
      // Direct fetch — works from browser, MDX is CORS-enabled
      const r=await fetch(
        MDX+'/manga?title='+encodeURIComponent(t)+'&limit=10'+CR+'&availableTranslatedLanguage[]=en&order[relevance]=desc',
        {signal:AbortSignal.timeout(14000)}
      );
      if(!r.ok)continue;
      const d=await r.json();
      if(d?.data?.length)return d.data[0].id;
    }catch(e){
      // If direct fetch fails, MDX may be temporarily down — skip gracefully
      console.warn('MDX search failed for "'+t+'":', e.message);
    }
  }
  return null;
}

async function mdxChapters(mdxId){
  let all=[],off=0;
  while(true){
    try{
      const r=await fetch(
        MDX+'/manga/'+mdxId+'/feed?translatedLanguage[]=en&order[chapter]=asc&limit=100&offset='+off+CR,
        {signal:AbortSignal.timeout(14000)}
      );
      if(!r.ok)break;
      const d=await r.json();
      const items=d?.data||[];
      all=all.concat(items);
      if(items.length<100)break;
      off+=100;if(off>900)break;
    }catch(e){break;}
  }
  const seen=new Set();
  return all
    .filter(c=>{const n=c.attributes?.chapter||'?';if(seen.has(n))return false;seen.add(n);return true;})
    .map(c=>({id:c.id,ch:c.attributes?.chapter||'?',title:c.attributes?.title||'',pages:c.attributes?.pages||0}));
}

async function mdxPages(chapId){
  // at-home server is CORS-open, try direct first
  try{
    const r=await fetch(MDX+'/at-home/server/'+chapId,{signal:AbortSignal.timeout(12000)});
    if(r.ok){
      const d=await r.json();
      if(d?.chapter)return buildPageUrls(d);
    }
  }catch(e){}
  return [];
}

function buildPageUrls(d){
  const base=d.baseUrl,hash=d.chapter.hash;
  const useDS=d.chapter.dataSaver?.length>0;
  const files=useDS?d.chapter.dataSaver:d.chapter.data;
  const q=useDS?'data-saver':'data';
  return(files||[]).map(f=>base+'/'+q+'/'+hash+'/'+f);
}

// ═══════════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════════
let cache=[]; // mangaCache
let curManga=null,curChapters=[],curChIdx=0,curPages=[];
let mdxId=null;
let bPage=1,bLoading=false,bDone=false,bQuery='',bGenre='all';
let bookmarks=JSON.parse(localStorage.getItem('am_bm')||'[]');
let downloads=JSON.parse(localStorage.getItem('am_dl')||'[]');
const readHist=JSON.parse(localStorage.getItem('am_rd')||'{}');
const saveBM=()=>localStorage.setItem('am_bm',JSON.stringify(bookmarks));
const saveDL=()=>localStorage.setItem('am_dl',JSON.stringify(downloads));
const saveRd=()=>localStorage.setItem('am_rd',JSON.stringify(readHist));

function toggleBM(m){
  const i=bookmarks.findIndex(b=>b.id===m.id);
  if(i>=0){bookmarks.splice(i,1);toast('Bookmark removed','warning');}
  else{bookmarks.push(m);toast('Bookmarked!','success');}
  saveBM();
}
function getM(id){return cache.find(x=>x.id===id)||bookmarks.find(x=>x.id===id)||downloads.find(x=>x.id===id);}

//  CARD

function mkCard(manga,grid=false){
  const isBm=bookmarks.some(b=>b.id===manga.id);
  const el=document.createElement('div');
  el.className='manga-card'+(grid?' grid-card':'');
  el.dataset.id=manga.id;
  const genre=(manga.genres||[])[0]||manga.type||'Manga';
  const chaps=manga.chapters?manga.chapters+' ch':'Ongoing';
  const score=manga.rating?parseFloat(manga.rating).toFixed(1):null;
  el.innerHTML=
    '<div class="card-frame">'+
      '<img class="card-cover" src="'+manga.cover+'" alt="'+manga.title+'" loading="lazy" onerror="this.src=\'https://placehold.co/300x400/0d1120/00d4ff?text=No+Cover\'"/>'+
      (score?'<div class="card-score"><i class="fas fa-star" style="font-size:8px"></i> '+score+'</div>':'')+
      (manga.type?'<div class="card-type">'+manga.type+'</div>':'')+
      '<div class="card-overlay">'+
        '<div class="card-title">'+manga.title+'</div>'+
        '<div class="card-meta"><span class="ctag">'+genre+'</span> · '+chaps+'</div>'+
        '<div class="card-acts">'+
          '<button class="c-btn rd-btn">Read</button>'+
          '<button class="c-btn bm bm-btn"><i class="fas fa-bookmark" style="color:'+(isBm?'var(--neon)':'inherit')+'"></i></button>'+
        '</div>'+
      '</div>'+
    '</div>';
  return el;
}

function attachEv(container){
  container.querySelectorAll('.manga-card').forEach(card=>{
    const gm=()=>getM(card.dataset.id);
    card.addEventListener('click',()=>{const m=gm();if(m)openDetails(m);});
    card.querySelector('.rd-btn')?.addEventListener('click',e=>{e.stopPropagation();const m=gm();if(m)openDetails(m);});
    card.querySelector('.bm-btn')?.addEventListener('click',e=>{
      e.stopPropagation();const m=gm();if(!m)return;
      toggleBM(m);
      card.querySelector('.bm-btn i').style.color=bookmarks.some(b=>b.id===m.id)?'var(--neon)':'inherit';
    });
  });
}

function renderBM(){
  const g=$('bmGrid'),e=$('bmEmpty');
  if(!bookmarks.length){g.innerHTML='';e.style.display='flex';return;}
  e.style.display='none';g.innerHTML='';
  bookmarks.forEach(m=>{if(!getM(m.id))cache.push(m);const el=mkCard(m,true);g.appendChild(el);});
  attachEv(g);
}
function renderDL(){
  const g=$('dlGrid'),e=$('dlEmpty');
  if(!downloads.length){g.innerHTML='';e.style.display='flex';return;}
  e.style.display='none';g.innerHTML='';
  downloads.forEach(m=>{if(!getM(m.id))cache.push(m);const el=mkCard(m,true);g.appendChild(el);});
  attachEv(g);
}

let hItems=[],hIdx=0,hTimer=null;
const H_DUR=7000;

function mkSlide(manga,idx){
  const el=document.createElement('div');
  el.className='hero-slide'+(idx===0?' active':'');
  const score=manga.rating?parseFloat(manga.rating).toFixed(1):null;
  el.innerHTML=
    '<div class="slide-bg" style="background-image:url(\''+manga.cover+'\')"></div>'+
    '<div class="slide-overlay"></div>'+
    '<div class="slide-content">'+
      '<div class="slide-eyebrow">Featured Manga</div>'+
      '<div class="slide-badges">'+
        (manga.type?'<span class="sl-badge">'+manga.type+'</span>':'')+
        (score?'<span class="sl-badge gold"><i class="fas fa-star"></i> '+score+'</span>':'')+
        ((manga.genres||[])[0]?'<span class="sl-badge">'+(manga.genres||[])[0]+'</span>':'')+
      '</div>'+
      '<div class="slide-title">'+manga.title+'</div>'+
      (manga.description?'<p class="slide-desc">'+manga.description.slice(0,160)+'…</p>':'')+
      '<div class="slide-acts">'+
        '<button class="sh-btn h-read-btn" data-id="'+manga.id+'"><i class="fas fa-book-reader"></i> Read Now</button>'+
        '<button class="sh-btn-out h-info-btn" data-id="'+manga.id+'"><i class="fas fa-info-circle"></i> Details</button>'+
      '</div>'+
    '</div>';
  el.querySelector('.h-read-btn').addEventListener('click',()=>{const m=getM(manga.id);if(m)openDetails(m);});
  el.querySelector('.h-info-btn').addEventListener('click',()=>{const m=getM(manga.id);if(m)openDetails(m);});
  return el;
}

function goSlide(idx){
  const slides=document.querySelectorAll('.hero-slide');
  if(!slides.length)return;
  slides[hIdx].classList.remove('active');
  hIdx=(idx+slides.length)%slides.length;
  slides[hIdx].classList.add('active');
  document.querySelectorAll('.s-dot').forEach((d,i)=>d.classList.toggle('active',i===hIdx));
  clearInterval(hTimer);
  hTimer=setInterval(()=>goSlide(hIdx+1),H_DUR);
}

async function initHero(){
  const d=await jFetch(JIKAN+'/top/manga?page=1&limit=8&filter=bypopularity');
  const loader=$('heroLoader');
  if(!d?.data?.length){if(loader)loader.remove();return;}
  hItems=d.data.map(mapJ);
  hItems.forEach(m=>{if(!getM(m.id))cache.push(m);});
  const slider=$('heroSlider'),ctrls=$('sliderCtrls'),dots=$('sliderDots');
  if(loader)loader.remove();
  hItems.slice(0,7).forEach((m,i)=>slider.insertBefore(mkSlide(m,i),ctrls));
  ctrls.style.display='flex';
  hItems.slice(0,7).forEach((_,i)=>{
    const d2=document.createElement('button');
    d2.className='s-dot'+(i===0?' active':'');
    d2.addEventListener('click',()=>goSlide(i));
    dots.appendChild(d2);
  });
  $('prevArr').addEventListener('click',()=>goSlide(hIdx-1));
  $('nextArr').addEventListener('click',()=>goSlide(hIdx+1));
  // Touch swipe
  let tx=0;
  slider.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;},{passive:true});
  slider.addEventListener('touchend',e=>{const d=tx-e.changedTouches[0].clientX;if(Math.abs(d)>50)goSlide(d>0?hIdx+1:hIdx-1);});
  hTimer=setInterval(()=>goSlide(hIdx+1),H_DUR);
}

async function loadCar(elId,url){
  const el=$(elId);if(!el)return;

  el.innerHTML='';
  if(!d?.data?.length){el.innerHTML='<span style="color:var(--muted);font-size:13px;padding:20px">Nothing to show</span>';return;}
  d.data.map(mapJ).forEach((m,i)=>{
    if(!getM(m.id))cache.push(m);
    const c=mkCard(m);c.style.animationDelay=(i*.04)+'s';el.appendChild(c);
  });
  attachEv(el);
}

// ═══════════════════════════════════════════════════════════════
//  BROWSE + INFINITE SCROLL
// ═══════════════════════════════════════════════════════════════
async function loadBrowse(reset=false){
  if(bLoading)return;if(bDone&&!reset)return;
  bLoading=true;$('loadWrap').classList.add('show');
  if(reset){bPage=1;bDone=false;$('browseGrid').innerHTML='';$('endWrap').classList.remove('show');}
  const{items,hasNext}=await jBrowse(bPage,bQuery,bGenre);
  bPage++;
  if(!hasNext||items.length<24){bDone=true;$('endWrap').classList.add('show');}
  items.forEach((m,i)=>{
    if(!getM(m.id))cache.push(m);
    const el=mkCard(m,true);el.style.animationDelay=(i*.03)+'s';
    $('browseGrid').appendChild(el);
  });
  attachEv($('browseGrid'));
  $('loadWrap').classList.remove('show');
  bLoading=false;
  if(!bDone&&document.body.scrollHeight<=window.innerHeight+100)loadBrowse();
}

window.addEventListener('scroll',()=>{
  if(!$('tab-home')?.classList.contains('active'))return;
  if(window.innerHeight+window.scrollY>=document.body.offsetHeight-800)loadBrowse();

// ═══════════════════════════════════════════════════════════════
async function openDetails(manga){
  curManga=manga;curChapters=[];mdxId=null;
  const isBm=bookmarks.some(b=>b.id===manga.id);
  $('detWrap').innerHTML=
    '<div><div class="det-cover"><img src="'+manga.cover+'" alt="'+manga.title+'" onerror="this.src=\'https://placehold.co/300x400/0d1120/00d4ff?text=No+Cover\'"/></div></div>'+
    '<div id="detInfo">'+
      '<h1 class="det-title">'+manga.title+'</h1>'+
      '<div class="det-chips">'+
        (manga.rating?'<span class="det-chip"><i class="fas fa-star"></i> '+parseFloat(manga.rating).toFixed(1)+'/10</span>':'')+
        (manga.year?'<span class="det-chip"><i class="fas fa-calendar"></i> '+manga.year+'</span>':'')+
        (manga.status?'<span class="det-chip"><i class="fas fa-circle" style="font-size:8px"></i> '+manga.status+'</span>':'')+
        (manga.chapters?'<span class="det-chip"><i class="fas fa-layer-group"></i> '+manga.chapters+' ch</span>':'<span class="det-chip"><i class="fas fa-sync"></i> Ongoing</span>')+
        (manga.type?'<span class="det-chip"><i class="fas fa-tag"></i> '+manga.type+'</span>':'')+
      '</div>'+
      '<div class="det-genres">'+(manga.genres||[]).map(g=>'<span class="det-genre">'+g+'</span>').join('')+'</div>'+
      '<p class="det-syn">'+(manga.description||'No synopsis available.').slice(0,480)+'…</p>'+
      '<div class="det-acts">'+
        '<button class="btn-p" id="detRead"><i class="fas fa-book-reader"></i> Start Reading</button>'+
        '<button class="btn-o bm-det"><i class="fas fa-bookmark"></i> '+(isBm?'Bookmarked':'Bookmark')+'</button>'+
      '</div>'+
      '<div class="ch-title">CHAPTERS <span class="ch-count" id="ch-count">Searching…</span></div>'+
      '<div class="ch-grid" id="chGrid">'+
        '<div style="grid-column:1/-1;padding:16px;font-family:\'Space Mono\',monospace;font-size:10px;color:var(--neon);letter-spacing:2px;display:flex;align-items:center;gap:8px">'+
          '<div class="spinner" style="width:16px;height:16px;border-width:2px;flex-shrink:0"></div> Finding chapters on MangaDex…'+
        '</div>'+
      '</div>'+
    '</div>';
  $('detPage').classList.add('open');
  $('detPage').scrollTop=0;
  $('detRead').addEventListener('click',()=>{if(curChapters.length)openReader(0);else toast('Still loading chapters…','warning');});
  $('detWrap').querySelector('.bm-det').addEventListener('click',function(){
    toggleBM(manga);this.innerHTML='<i class="fas fa-bookmark"></i> '+(bookmarks.some(b=>b.id===manga.id)?'Bookmarked':'Bookmark');
  });

  // ── FIND CHAPTERS ──
  const cg=$('chGrid'),cc=$('ch-count');
  try{
    mdxId=await mdxFind(manga);
    let chapters=[];
    if(mdxId){
      chapters=await mdxChapters(mdxId);
    }
    curChapters=chapters;
    if(!chapters.length){
      cc.textContent='0 chapters';
      cg.innerHTML=
        '<div style="grid-column:1/-1;padding:16px;font-family:\'Space Mono\',monospace;font-size:10px;color:var(--muted);line-height:1.9">'+
          'No English chapters found on MangaDex for this title.<br>'+
          '<span style="font-size:9px;opacity:.7">This title may not have scanlations available in English yet.</span>'+
        '</div>';
      return;
    }
    cc.textContent=chapters.length+' chapters';
    let html='';
    chapters.forEach((c,i)=>{
      const rd=!!readHist[c.id];
      html+='<div class="ch-item'+(rd?' read':'')+'" data-idx="'+i+'">'+
        '<span>Ch.'+c.ch+(c.title&&c.title.length<22?' · '+c.title:'')+'</span>'+
        '<i class="fas fa-chevron-right" style="font-size:8px;color:var(--border)"></i>'+
      '</div>';
    });
    cg.innerHTML=html;
    cg.querySelectorAll('.ch-item').forEach(item=>item.addEventListener('click',()=>openReader(parseInt(item.dataset.idx))));
  }catch(e){
    if(cg)cg.innerHTML='<div style="padding:16px;color:var(--muted);font-family:\'Space Mono\',monospace;font-size:10px">Error loading chapters. Please try again.</div>';
  }
}

$('backDet').addEventListener('click',()=>$('detPage').classList.remove('open'));

// ═══════════════════════════════════════════════════════════════
//  READER — loads pages directly via <img> tags (no CORS needed)
// ═══════════════════════════════════════════════════════════════
async function openReader(chIdx){
  curChIdx=chIdx;
  const chap=curChapters[chIdx];if(!chap)return;
  $('readerTitle').textContent=curManga.title+' — Ch.'+chap.ch+(chap.title?' · '+chap.title:'');
  $('ch-ind').textContent='Ch '+chap.ch+' ('+(chIdx+1)+'/'+curChapters.length+')';
  const body=$('readerBody');
  body.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px;color:var(--neon);font-family:\'Space Mono\',monospace;font-size:10px;letter-spacing:2px;text-align:center"><div class="spinner" style="border-top-color:var(--neon)"></div>LOADING PAGES…</div>';
  $('detPage').classList.remove('open');
  $('readerPage').classList.add('open');
  body.scrollTop=0;
  // Mark read
  readHist[chap.id]=true;saveRd();
  document.querySelectorAll('.ch-item').forEach(el=>{if(parseInt(el.dataset.idx)===chIdx){el.classList.add('read');el.classList.add('active');}else el.classList.remove('active');});

  const pages=await mdxPages(chap.id);
  curPages=pages;

  if(pages.length){
    body.innerHTML='';
    pages.forEach((url,i)=>{
      const img=document.createElement('img');
      img.alt='Page '+(i+1);
      img.loading=i<3?'eager':'lazy';
      img.className='loading-img';
      img.style.cssText='max-width:800px;width:100%;display:block;';
      // Images load via src — no CORS restriction on img tags
      // Retry with proxy only if image fails to load (e.g. CDN hot-link protection)
      img.onerror=function(){
        if(!this.dataset.r){
          this.dataset.r='1';
          this.src='https://corsproxy.io/?'+encodeURIComponent(url);
        }else{
          this.style.cssText='max-width:800px;width:100%;display:block;min-height:40px;background:var(--panel);';
          this.alt='Page '+(i+1)+' failed to load';
        }
      };
      img.onload=function(){this.classList.remove('loading-img');};
      img.src=url;
      body.appendChild(img);
    });
  }else{
    // MDX returned no pages — show retry UI
    body.innerHTML=
      '<div style="display:flex;flex-direction:column;align-items:center;gap:14px;padding:80px 20px;text-align:center;max-width:440px;margin:0 auto">'+
        '<i class="fas fa-exclamation-circle" style="font-size:42px;color:var(--neon);opacity:.35"></i>'+
        '<div style="font-family:\'Bebas Neue\',sans-serif;font-size:20px;letter-spacing:3px;color:var(--paper)">Pages Could Not Load</div>'+
        '<div style="font-family:\'Space Mono\',monospace;font-size:10px;color:var(--muted);line-height:1.8">MangaDex may be busy.<br>Wait a moment then retry.</div>'+
        '<div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap;justify-content:center">'+
          '<button onclick="openReader(curChIdx)" style="background:rgba(0,212,255,.15);border:1px solid var(--neon);color:var(--neon);padding:10px 20px;font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer"><i class="fas fa-redo"></i> Retry</button>'+
          (chIdx<curChapters.length-1?'<button onclick="openReader(curChIdx+1)" style="background:rgba(0,212,255,.08);border:1px solid var(--border);color:var(--aged);padding:10px 20px;font-family:\'Bebas Neue\',sans-serif;font-size:14px;letter-spacing:2px;cursor:pointer">Next Ch <i class="fas fa-chevron-right"></i></button>':'')+
        '</div>'+
      '</div>';
  }
}

$('prevCh').addEventListener('click',()=>{if(curChIdx>0)openReader(curChIdx-1);else toast('First chapter','warning');});
$('nextCh').addEventListener('click',()=>{if(curChIdx<curChapters.length-1)openReader(curChIdx+1);else toast('Last chapter','warning');});

//  DOWNLOAD — JSZip with proxy for blob access
// ═══════════════════════════════════════════════════════════════
$('dlCh').addEventListener('click',()=>{
  if(!curPages.length){toast('No pages loaded yet','warning');return;}
  const chap=curChapters[curChIdx];
  $('dlInfo').innerHTML=
    '<strong style="color:var(--paper)">'+curManga.title+'</strong><br>'+
    'Chapter '+chap.ch+(chap.title?' — '+chap.title:'')+
    '<br><span style="color:var(--neon)">'+curPages.length+' pages ready to download</span>';
  $('progWrap').style.display='none';
  $('progFill').style.width='0%';
  const btn=$('startZip');btn.disabled=false;
  btn.innerHTML='<i class="fas fa-file-archive"></i> Download All Pages as ZIP';
  $('dlModal').classList.add('open');
});

$('closeDl').addEventListener('click',()=>$('dlModal').classList.remove('open'));
$('dlModal').addEventListener('click',e=>{if(e.target===$('dlModal'))$('dlModal').classList.remove('open');});

$('startZip').addEventListener('click',async()=>{
  if(!curPages.length){toast('No pages to download','error');return;}
  const btn=$('startZip'),pw=$('progWrap'),pf=$('progFill'),pt=$('prog-txt');
  btn.disabled=true;btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Preparing…';
  pw.style.display='block';pf.style.width='0%';pt.textContent='Loading JSZip…';
  try{
    if(!window.JSZip){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
        s.onload=res;s.onerror=rej;document.head.appendChild(s);
      });
    }
    const zip=new window.JSZip();
    const chap=curChapters[curChIdx];
    const safeName=(curManga.title||'manga').replace(/[^a-z0-9]/gi,'_');
    const folder=zip.folder(safeName+'_Ch'+(chap?.ch||'0'));
    const total=curPages.length;let done=0;
    pt.textContent='0 / '+total;

    for(let i=0;i<curPages.length;i++){
      const rawUrl=curPages[i];
      const ext=(rawUrl.split('?')[0].split('.').pop()||'jpg').toLowerCase().replace(/[^a-z]/g,'').slice(0,4)||'jpg';
      const fname='page_'+String(i+1).padStart(3,'0')+'.'+ext;
      let blob=null;
      // For ZIP download we need blob — use proxy since CDN may block cross-origin blob
      const urls=[
        'https://corsproxy.io/?'+encodeURIComponent(rawUrl),
        'https://api.allorigins.win/raw?url='+encodeURIComponent(rawUrl),
        rawUrl  // last resort direct
      ];
      for(const u of urls){
        try{
          const ctrl=new AbortController();
          const tid=setTimeout(()=>ctrl.abort(),16000);
          const r=await fetch(u,{signal:ctrl.signal});
          clearTimeout(tid);
          if(r.ok){blob=await r.blob();break;}
        }catch(e){}
      }
      if(blob)folder.file(fname,blob);
      done++;
      const pct=Math.round((done/total)*100);
      pf.style.width=pct+'%';pt.textContent=done+' / '+total+' ('+pct+'%)';
    }

    pt.textContent='Creating ZIP…';pf.style.width='95%';
    const zblob=await zip.generateAsync({type:'blob',compression:'DEFLATE',compressionOptions:{level:3}});
    pf.style.width='100%';pt.textContent='Done!';
    const a=document.createElement('a');
    a.href=URL.createObjectURL(zblob);
    a.download=safeName+'_Ch'+(chap?.ch||'0')+'.zip';
    document.body.appendChild(a);a.click();
    URL.revokeObjectURL(a.href);document.body.removeChild(a);
    if(!downloads.find(d=>d.id===curManga.id)){downloads.push(curManga);saveDL();}
    toast('Downloaded '+total+' pages!','success');
    setTimeout(()=>$('dlModal').classList.remove('open'),1500);
  }catch(e){
    toast('Download failed — try again','error');
    pt.textContent='Error: '+e.message;
  }
  btn.disabled=false;btn.innerHTML='<i class="fas fa-file-archive"></i> Download All Pages as ZIP';
});
